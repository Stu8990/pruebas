<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1035"/>
      <stop offset="100%" stop-color="#3b1d84"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Area fill under chart -->
  <path d="M88,370 L200,240 L290,300 L420,148 L420,424 L88,424 Z"
    fill="rgba(167,139,250,0.13)"/>
  <!-- Chart line -->
  <polyline
    points="88,370 200,240 290,300 420,148"
    fill="none" stroke="white" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polyline
    points="358,126 420,148 400,210"
    fill="none" stroke="white" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inflection nodes -->
  <circle cx="200" cy="240" r="13" fill="#a78bfa"/>
  <circle cx="290" cy="300" r="13" fill="#a78bfa"/>
  <!-- Peak node -->
  <circle cx="420" cy="148" r="18" fill="#c4b5fd"/>
